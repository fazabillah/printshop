version: '3.9'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
